<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子正方体 + 年轮 - p5.js</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    #wrap {
      display: grid;
      place-items: center;
      gap: 10px;
      padding: 18px;
    }
    canvas {
      border-radius: 18px;
      box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 120px rgba(120,170,255,0.07);
      outline: 1px solid rgba(255,255,255,0.05);
    }
    .hint {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      letter-spacing: 0.02em;
      user-select: none;
      text-align: center;
      line-height: 1.35;
    }
    kbd {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      font-size: 11px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
</head>
<body>
  <div id="wrap">
    <div class="hint">
      黑底｜粒子正方体｜同心方环年轮｜呼吸<br/>
      按 <kbd>R</kbd> 开始导出帧序列（PNG），按 <kbd>ESC</kbd> 停止
    </div>
  </div>
  <script src="./sketch.js"></script>
</body>
</html>
